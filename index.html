<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Jam — band practice charts</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="root"></div>
  <div id="hud" class="hud" aria-hidden="true">
    <span class="hud-key">F</span> fullscreen
    <span class="hud-key">L</span> lyrics
    <span class="hud-key">C</span> chart
    <span class="hud-key">←/→</span> song
    <span class="hud-key">R</span> reload
    <span class="hud-key">Esc</span> setlist
  </div>
  <script src="chord-renderer.js"></script>
  <script src="app.js"></script>
</body>
</html>
